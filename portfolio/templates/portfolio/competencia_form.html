{% extends "portfolio/base.html" %}

{% block content %}

<section class="container mt-5">
    <div class="card bg-dark text-light border-secondary shadow p-4">
        <h1 class="mb-4">Competência</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Guardar
            </button>

            <a href="{% url 'lista_competencias' %}" class="btn btn-secondary">
                Cancelar
            </a>
        </form>
    </div>
</section>

{% endblock %}
