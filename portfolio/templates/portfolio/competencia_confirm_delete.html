{% extends "portfolio/base.html" %}

{% block content %}

<section class="container mt-5">
    <div class="card bg-dark text-light border-secondary shadow p-4">
        <h1 class="mb-4">Apagar Competência</h1>

        <p>Tem a certeza que quer apagar "<strong>{{ competencia.nome }}</strong>"?</p>

        <form method="post">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Sim, apagar
            </button>

            <a href="{% url 'lista_competencias' %}" class="btn btn-secondary">
                Cancelar
            </a>
        </form>
    </div>
</section>

{% endblock %}
