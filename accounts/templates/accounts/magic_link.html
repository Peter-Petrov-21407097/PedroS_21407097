{% extends "portfolio/base.html" %}

{% block content %}

<h1>Login com link mágico</h1>

{% if mensagem %}
    <p>{{ mensagem }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Enviar link mágico</button>
</form>

<a href="{% url 'accounts:login' %}">Voltar ao login</a>

{% endblock %}
